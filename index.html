<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="IfD Grant Writer — Track grant opportunities, manage proposals, and build institutional knowledge for the Institute for Development.">
<meta name="theme-color" content="#1B3B36">
<title>IfD Grant Writer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,600;0,6..72,700;0,6..72,800;1,6..72,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#FAF8F4;--surface:#FFF;--surface-alt:#F5F2ED;--border:#E8E4DD;--border-lt:#F0EDE7;--ink:#1A1A1A;--ink2:#5C5549;--ink3:#9A9084;--green:#1B3B36;--green-lt:#2A5A4F;--green-pale:#E8EFED;--amber:#C68B2C;--amber-pale:#FBF3E4;--red:#B3261E;--red-pale:#FDECEA;--blue:#2D7FF9;--blue-pale:#E8F0FE;--radius:10px;--radius-sm:6px;--shadow:0 1px 3px rgba(26,26,26,.06),0 0 0 1px rgba(26,26,26,.04);--shadow-lg:0 8px 30px rgba(26,26,26,.1),0 0 0 1px rgba(26,26,26,.04);--font:'Outfit',sans-serif;--serif:'Newsreader','Georgia',serif}
html{font-size:14px}body{font-family:var(--font);background:var(--bg);color:var(--ink);min-height:100vh}a{color:var(--green);text-decoration:none}button{font-family:var(--font);cursor:pointer}input,select,textarea{font-family:var(--font)}
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}.auth-card{background:var(--surface);border-radius:14px;box-shadow:var(--shadow-lg);padding:2.5rem 2.25rem;width:100%;max-width:400px}.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:1.75rem}.auth-logo-box{width:38px;height:38px;border-radius:8px;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800}.auth-logo-text{font-size:18px;font-weight:800;font-family:var(--serif);color:var(--ink)}.auth-title{font-size:18px;font-weight:700;font-family:var(--serif);margin-bottom:.25rem}.auth-sub{font-size:13px;color:var(--ink3);margin-bottom:1.5rem;line-height:1.5}.form-error{font-size:12px;color:var(--red);min-height:18px;margin-top:4px}.form-success{font-size:12px;color:var(--green);min-height:18px;margin-top:4px;text-align:center}
.app-layout{display:flex;min-height:100vh}.sidebar{width:220px;background:var(--green);color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .25s ease}.main{flex:1;min-width:0;margin-left:220px}.main-header{padding:20px 32px 0;margin-bottom:24px}.main-header h1{font-size:24px;font-weight:800;font-family:var(--serif);letter-spacing:-.02em;line-height:1.2}.main-header p{font-size:13px;color:var(--ink3);margin-top:4px}.main-body{padding:0 32px 40px}
.sidebar-logo{padding:24px 20px 20px;display:flex;align-items:center;gap:10px}.sidebar-logo-box{width:34px;height:34px;border-radius:8px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800}.sidebar-logo-text{font-size:14px;font-weight:700;letter-spacing:-.01em;line-height:1.2}.sidebar-logo-sub{font-size:10px;opacity:.5;font-weight:500}.sidebar nav{padding:0 10px;flex:1}.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 14px;border-radius:8px;border:none;background:transparent;color:rgba(255,255,255,.6);font-size:13.5px;font-weight:500;text-align:left;margin-bottom:2px;transition:all .12s}.nav-btn:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85)}.nav-btn.active{background:rgba(255,255,255,.14);color:#fff;font-weight:600}.nav-icon{font-size:12px;opacity:.6;width:16px;text-align:center}.nav-btn.active .nav-icon{opacity:1}.sidebar-user{padding:12px 20px;border-top:1px solid rgba(255,255,255,.08)}.sidebar-user-name{font-size:12px;font-weight:600;color:rgba(255,255,255,.8)}.sidebar-user-email{font-size:10.5px;color:rgba(255,255,255,.4);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.sidebar-footer{padding:12px 20px;border-top:1px solid rgba(255,255,255,.08);font-size:10.5px;color:rgba(255,255,255,.35);line-height:1.5}
.hamburger{display:none;position:fixed;top:12px;left:12px;z-index:200;width:40px;height:40px;border-radius:8px;background:var(--green);color:#fff;border:none;font-size:20px;align-items:center;justify-content:center;box-shadow:var(--shadow)}.sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:90}
.card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);transition:box-shadow .2s ease,transform .2s ease}.card:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px)}.stat-card{padding:20px 22px;position:relative;overflow:hidden}.stat-card .accent{position:absolute;top:0;left:0;right:0;height:3px}.stat-label{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em}.stat-value{font-size:34px;font-weight:800;font-family:var(--serif);margin-top:4px;line-height:1}.stat-sub{font-size:11.5px;color:var(--ink3);margin-top:6px}
.pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:11.5px;font-weight:600;letter-spacing:.01em;white-space:nowrap}
.btn{border:none;border-radius:var(--radius-sm);font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:all .15s;padding:9px 18px;font-size:13px}.btn:disabled{opacity:.4;cursor:default}.btn-primary{background:var(--green);color:#fff}.btn-primary:hover:not(:disabled){background:var(--green-lt)}.btn-secondary{background:var(--surface-alt);color:var(--ink2);border:1px solid var(--border)}.btn-ghost{background:none;color:var(--green);padding:6px 12px}.btn-danger{background:var(--red);color:#fff}.btn-sm{padding:6px 13px;font-size:12px}
.field{margin-bottom:14px}.field label{display:block;font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:5px;letter-spacing:.02em}.field input,.field select,.field textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13.5px;color:var(--ink);outline:none;background:var(--surface);transition:border-color .15s}.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--green)}.field textarea{min-height:120px;resize:vertical;line-height:1.6}.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
.modal-overlay{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;background:rgba(26,26,26,.4);backdrop-filter:blur(4px)}.modal{background:var(--surface);border-radius:14px;width:min(720px,94vw);max-height:90vh;overflow:auto;box-shadow:var(--shadow-lg)}.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--border)}.modal-head span{font-size:16px;font-weight:700;font-family:var(--serif);color:var(--ink)}.modal-close{background:none;border:none;font-size:18px;color:var(--ink3);padding:4px 8px;border-radius:6px}.modal-body{padding:24px}
.table-wrap{overflow-x:auto}table{width:100%;border-collapse:collapse;font-size:13px}thead{background:var(--surface-alt);border-bottom:1px solid var(--border)}th{padding:11px 16px;text-align:left;font-weight:700;color:var(--ink3);font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}td{padding:13px 16px}tbody tr{border-bottom:1px solid var(--border-lt);cursor:pointer;transition:background .1s}tbody tr:hover{background:var(--surface-alt)}
.cat-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}.cat-tab{padding:7px 16px;border-radius:99px;border:1.5px solid var(--border);background:transparent;color:var(--ink2);font-size:12.5px;font-weight:600;transition:all .12s}.cat-tab:hover{border-color:var(--ink3)}.cat-tab.active{border-color:var(--green);background:var(--green);color:#fff}
.kb-card{overflow:hidden;border-left:3px solid var(--green);cursor:pointer;transition:box-shadow .15s}.kb-card:hover{box-shadow:0 2px 8px rgba(26,26,26,.08),0 0 0 1px rgba(26,26,26,.04)}.kb-card-inner{padding:16px 20px}.kb-content{font-size:13px;color:var(--ink2);line-height:1.6}.kb-content.clamped{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.tag{font-size:11px;padding:2px 9px;border-radius:99px;background:var(--surface-alt);color:var(--ink3);font-weight:500;border:1px solid var(--border-lt)}.kb-cov{padding:14px 16px;border-radius:var(--radius-sm);cursor:pointer;transition:all .12s}.kb-cov:hover{opacity:.85}.kb-cov.filled{background:var(--green-pale);border:1px solid #C8DDD6}.kb-cov.empty{background:var(--surface-alt);border:1px solid var(--border)}
.board{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px}.board-col{min-width:230px;flex:0 0 230px}.board-col-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:0 4px}.board-col-dot{width:8px;height:8px;border-radius:50%}.board-col-label{font-size:12px;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.05em}.board-col-count{font-size:11px;font-weight:700;color:var(--ink3);background:var(--surface-alt);border-radius:99px;padding:1px 8px}.board-card{padding:14px 16px;cursor:pointer;border-left:3px solid var(--ink3)}.board-empty{padding:20px;text-align:center;background:var(--surface-alt);border-radius:var(--radius);border:1px dashed var(--border);font-size:11.5px;color:var(--ink3)}
.date-tile{width:44px;height:44px;border-radius:10px;background:var(--surface-alt);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--border-lt)}.date-tile-day{font-size:14px;font-weight:800;color:var(--ink);line-height:1}.date-tile-month{font-size:9px;font-weight:600;color:var(--ink3);text-transform:uppercase}.progress-track{flex:1;height:8px;background:var(--surface-alt);border-radius:99px;overflow:hidden}.progress-fill{height:100%;border-radius:99px;transition:width .4s ease}
.empty{text-align:center;padding:60px 20px}.empty-icon{font-size:42px;opacity:.3;margin-bottom:12px}.empty-title{font-size:15px;font-weight:600;color:var(--ink);font-family:var(--serif)}.empty-sub{font-size:13px;color:var(--ink3);margin:6px 0 20px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);padding:10px 24px;border-radius:99px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:all .3s;pointer-events:none}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.toast-success{background:var(--green);color:#fff}.toast-error{background:var(--red);color:#fff}
.loading-overlay{position:fixed;inset:0;z-index:1500;background:rgba(250,248,244,.7);display:flex;align-items:center;justify-content:center}.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}.fade-in{animation:fadeIn .3s ease both}
.confirm-body{text-align:center;padding:8px 0}.confirm-body p{font-size:14px;color:var(--ink2);margin-bottom:20px;line-height:1.5}.confirm-actions{display:flex;gap:10px;justify-content:center}
@media(max-width:768px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.sidebar-backdrop.open{display:block}.hamburger{display:flex}.main{margin-left:0}.main-body{padding:0 16px 32px}.main-header{padding:16px 16px 0;padding-top:60px}.grid-2{grid-template-columns:1fr}.stat-grid{grid-template-columns:repeat(2,1fr)!important}.dash-cols{grid-template-columns:1fr!important}}
@media(max-width:480px){.stat-grid{grid-template-columns:1fr!important}}
</style>
</head>
<body>
<div id="auth-view" style="display:none"><div class="auth-wrap"><div class="auth-card">
<div class="auth-logo"><div class="auth-logo-box">IfD</div><div class="auth-logo-text">Grant Writer</div></div>
<div id="login-panel"><div class="auth-title">Sign in</div><div class="auth-sub">Access the IfD grant pipeline and knowledge base</div><div class="field"><label>Email</label><input type="email" id="l-email" placeholder="you@ifdsl.org" autocomplete="email"></div><div class="field"><label>Password</label><input type="password" id="l-password" placeholder="••••••••" autocomplete="current-password"></div><div class="form-error" id="l-error"></div><div style="margin-top:1rem"><button class="btn btn-primary" id="l-btn" onclick="doSignIn()" style="width:100%;justify-content:center">Sign in</button></div><div style="margin-top:1rem"><button onclick="doForgotPassword()" style="width:100%;font-size:12px;color:var(--ink3);border:none;background:none;padding:6px 0;cursor:pointer">Forgot password?</button></div><div class="form-success" id="reset-msg"></div><div style="margin-top:.75rem;padding-top:1rem;border-top:1px solid var(--border-lt);font-size:12px;color:var(--ink3);text-align:center;line-height:1.6">Don't have an account? Contact your IfD administrator.</div></div>
<div id="invite-panel" style="display:none"><div class="auth-title">Welcome to IfD Grant Writer</div><div class="auth-sub">You've been invited. Complete your account setup.</div><div class="field"><label>Full name</label><input type="text" id="inv-name" placeholder="e.g. Saidu Jalloh" autocomplete="name"></div><div class="field"><label>Password <span style="color:var(--ink3)">(min 8 chars)</span></label><input type="password" id="inv-password" autocomplete="new-password"></div><div class="field"><label>Confirm password</label><input type="password" id="inv-confirm" autocomplete="new-password"></div><div class="form-error" id="inv-error"></div><div style="margin-top:1rem"><button class="btn btn-primary" id="inv-btn" onclick="doInviteSetup()" style="width:100%;justify-content:center">Complete setup</button></div></div>
<div id="reset-panel" style="display:none"><div class="auth-title">Set a new password</div><div class="auth-sub">Enter and confirm your new password below.</div><div class="field"><label>New password <span style="color:var(--ink3)">(min 8 chars)</span></label><input type="password" id="rst-password" autocomplete="new-password"></div><div class="field"><label>Confirm password</label><input type="password" id="rst-confirm" autocomplete="new-password"></div><div class="form-error" id="rst-error"></div><div style="margin-top:1rem"><button class="btn btn-primary" id="rst-btn" onclick="doResetPassword()" style="width:100%;justify-content:center">Set new password</button></div></div>
</div></div></div>
<button class="hamburger" id="hamburger" onclick="toggleSidebar()" aria-label="Toggle navigation menu">☰</button>
<div class="sidebar-backdrop" id="sidebar-backdrop" onclick="toggleSidebar()"></div>
<div id="app-view" style="display:none"></div>
<div id="toast" class="toast" role="status" aria-live="polite"></div>
<div id="loading" class="loading-overlay" style="display:none"><div class="spinner"></div></div>
<script>
const SUPABASE_URL='SUPA';
const SUPABASE_ANON_KEY='ANON';
const db=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
let user=null,profile=null;
const S={page:'dashboard',kb:[],grants:[],screenings:[],modal:null,kbFilter:'all',kbSearch:'',kbExpanded:null,grantFilter:'all',grantView:'table',sidebarOpen:false};
const KB_CATS=[{v:'proposal',l:'Past Proposals'},{v:'organisation',l:'Organisation'},{v:'project',l:'Projects'},{v:'template',l:'Templates'},{v:'reference',l:'References'}];
const STATUSES=[{v:'identified',l:'Identified',c:'#8E8E93',bg:'#F2F2F7'},{v:'screening',l:'Screening',c:'#7C6BC4',bg:'#F0EDF9'},{v:'drafting',l:'Drafting',c:'#2D7FF9',bg:'#E8F0FE'},{v:'review',l:'Review',c:'#D4880F',bg:'#FEF3E2'},{v:'finalising',l:'Finalising',c:'#D44D2C',bg:'#FEEBE6'},{v:'submitted',l:'Submitted',c:'#1B7F5A',bg:'#E6F5EE'},{v:'awarded',l:'Awarded',c:'#0D6344',bg:'#D1F0E2'},{v:'rejected',l:'Not Selected',c:'#B3261E',bg:'#FDECEA'}];
const el=id=>document.getElementById(id),val=id=>(el(id)?.value||'').trim(),show=id=>{const e=el(id);if(e)e.style.display=''},hide=id=>{const e=el(id);if(e)e.style.display='none'};
function showPanel(n){['login-panel','invite-panel','reset-panel'].forEach(id=>{const e=el(id);if(e)e.style.display=id===n+'-panel'?'':'none'})}
function setError(id,m){const e=el(id);if(e)e.textContent=m||''}
function setBtn(id,t,d){const b=el(id);if(b){b.textContent=t;b.disabled=d}}
function showLoading(){el('loading').style.display='flex'}
function hideLoading(){el('loading').style.display='none'}
function toast(msg,type){const t=el('toast');t.textContent=msg;t.className='toast toast-'+(type||'success')+' show';setTimeout(()=>t.classList.remove('show'),3000)}
function timeAgo(d){if(!d)return '';const s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return 'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';const dy=Math.floor(s/86400);if(dy<7)return dy+'d ago';if(dy<30)return Math.floor(dy/7)+'w ago';return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}
function daysLeft(d){if(!d)return null;return Math.ceil((new Date(d)-new Date())/864e5)}
function urgCol(d){return d===null?'#8E8E93':d<0?'#B3261E':d<=7?'#D44D2C':d<=21?'#D4880F':'#1B7F5A'}
function urgTxt(d){return d===null?'No deadline':d<0?Math.abs(d)+'d overdue':d===0?'Due today':d===1?'Tomorrow':d+' days'}
function wordCount(s){return s?s.trim().split(/\s+/).length:0}
function statusObj(v){return STATUSES.find(s=>s.v===v)||STATUSES[0]}
function catObj(v){return KB_CATS.find(c=>c.v===v)||KB_CATS[0]}
function fmtDate(d){return d?new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):'—'}
function copyText(t){navigator.clipboard.writeText(t).then(()=>toast('Copied: '+t)).catch(()=>toast('Copy failed','error'))}
let _st;function debounce(fn,ms){return function(){clearTimeout(_st);_st=setTimeout(fn,ms||300)}}
function toggleSidebar(){S.sidebarOpen=!S.sidebarOpen;document.querySelector('.sidebar')?.classList.toggle('open',S.sidebarOpen);el('sidebar-backdrop')?.classList.toggle('open',S.sidebarOpen)}
function h(tag,attrs){const e=document.createElement(tag);const ch=Array.from(arguments).slice(2);for(const[k,v]of Object.entries(attrs||{})){if(k==='style'&&typeof v==='object')Object.assign(e.style,v);else if(k.startsWith('on')&&typeof v==='function')e.addEventListener(k.slice(2).toLowerCase(),v);else if(k==='className')e.className=v;else if(k==='innerHTML')e.innerHTML=v;else e.setAttribute(k,v)}for(const c of ch.flat()){if(c==null)continue;e.appendChild(typeof c==='string'?document.createTextNode(c):c)}return e}
function pill(t,c,bg){return h('span',{className:'pill',style:{color:c,background:bg||'var(--surface-alt)'}},t)}
function scoreColor(s){if(s<=2)return'var(--red)';if(s<=3)return'var(--amber)';if(s<=4)return'var(--blue)';return'var(--green)'}
function getScreening(grantId){return S.screenings.find(s=>s.grantId===grantId)}
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&S.modal&&S.modal!=='complete-profile'){S.modal=null;render()}});
function isSessionError(e){const m=(e.message||'').toLowerCase();return m.includes('jwt')||m.includes('token')||m.includes('refresh_token')||m.includes('unauthorized')||e.status===401||e.status===403}
document.addEventListener('visibilitychange',async()=>{if(document.visibilityState==='visible'&&user){try{const{data,error}=await db.auth.getSession();if(error||!data.session)doSignOut()}catch(e){doSignOut()}}});
document.addEventListener('keydown',e=>{if(e.key==='Enter'){const lp=el('login-panel'),ip=el('invite-panel'),rp=el('reset-panel');if(lp&&lp.style.display!=='none'&&(e.target.id==='l-email'||e.target.id==='l-password'))doSignIn();else if(ip&&ip.style.display!=='none'&&['inv-name','inv-password','inv-confirm'].includes(e.target.id))doInviteSetup();else if(rp&&rp.style.display!=='none'&&['rst-password','rst-confirm'].includes(e.target.id))doResetPassword()}});
// AUTH
async function init(){const hash=window.location.hash;if(hash.includes('type=invite')){show('auth-view');hide('app-view');showPanel('invite')}else if(hash.includes('type=recovery')){show('auth-view');hide('app-view');showPanel('reset')}else{const{data:{session}}=await db.auth.getSession();if(session){user=session.user;await loadProfile();showAppOrCompleteProfile()}else{show('auth-view');hide('app-view');showPanel('login')}}db.auth.onAuthStateChange(async(ev,session)=>{if(ev==='PASSWORD_RECOVERY'&&session){user=session.user;show('auth-view');hide('app-view');showPanel('reset');return}if((ev==='SIGNED_IN'||ev==='USER_UPDATED')&&session){user=session.user;if(['invite-panel','reset-panel'].some(id=>el(id)&&el(id).style.display!=='none'))return;await loadProfile();showAppOrCompleteProfile()}else if(ev==='SIGNED_OUT'){if(el('app-view')&&el('app-view').style.display!=='none')toast('Session expired','error');user=null;profile=null;show('auth-view');hide('app-view');showPanel('login')}})}
